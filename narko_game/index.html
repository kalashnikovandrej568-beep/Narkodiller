<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Narko Game — Симулятор</title>
  <style>
    body { background: #181818; color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; }
    .container { max-width: 420px; margin: 40px auto; background: #232323; border-radius: 12px; box-shadow: 0 0 24px #0008; padding: 28px 24px; }
    h1 { color: #ff4e7a; text-align: center; margin-bottom: 8px; }
    .warn { color: #ffb347; background: #2a1a1a; border-radius: 8px; padding: 10px 14px; margin-bottom: 18px; font-size: 15px; text-align: center; }
    .stats, .actions { margin: 18px 0; }
    .stats div { margin-bottom: 6px; }
    button { background: #ff4e7a; color: #fff; border: none; border-radius: 6px; padding: 10px 18px; font-size: 15px; margin: 6px 0; cursor: pointer; transition: background .2s; }
    button:hover { background: #ff7fa7; }
    .log { background: #19191a; border-radius: 6px; padding: 10px; min-height: 60px; font-size: 13px; margin-top: 18px; max-height: 120px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Narko Game</h1>
    <div class="warn">
      ⚠️ Игра создана для развлечения и образования. В реальной жизни наркотики опасны и незаконны. Не пробуйте этого в реальности!
    </div>
    <div class="stats" id="stats"></div>
    <div class="actions">
      <button onclick="produce()">Произвести товар</button>
      <button onclick="sell()">Продать товар</button>
      <button onclick="nextDay()">Следующий день</button>
    </div>
    <div class="log" id="log"></div>
  </div>
  <div class="tabs">
    <button onclick="showTab('farm')" id="tab-farm">Ферма</button>
    <button onclick="showTab('lab')" id="tab-lab">Лаборатория</button>
    <button onclick="showTab('shop')" id="tab-shop">Магазин</button>
    <button onclick="showTab('clients')" id="tab-clients">Клиенты</button>
    <button onclick="showTab('fin')" id="tab-fin">Финансы</button>
  </div>
  <div id="tab-content"></div>
  <script>
    let day = 1;
    let money = 100;
    let product = 0;
    let risk = 5;
    let wanted = 0;
    let log = [];
    // --- Новые переменные для фермы ---
    let farm = {
      cocaine: { planted: 0, growing: 0, ready: 0 },
      weed: { planted: 0, growing: 0, ready: 0 }
    };
    // --- Магазин хим. элементов и лаборатория ---
    let reagents = { pseudo: 0, acid: 0, redp: 0 };
    let meth = 0;
    // --- Система поиска клиентов и продажи ---
    let clients = [];
    function renderClients() {
      let html = `<h2>Клиенты</h2>`;
      html += `<button onclick='findClient()'>Поиск клиента (-5$)</button><br><br>`;
      if(clients.length === 0) html += '<div>Нет найденных клиентов. Ищите новых!</div>';
      else {
        html += '<div>Найденные клиенты:</div>';
        clients.forEach((c,i)=>{
          html += `<div style='margin:8px 0;padding:8px;background:#232;'>`;
          html += `<b>${c.type==='meth'?'Метамфетамин':c.type==='cocaine'?'Кокаин':'Марихуана'}</b> — ${c.name}<br>`;
          html += `Цена: <b>${c.price}$</b> за 10г<br>`;
          html += `<button onclick='sellToClient(${i})'>Продать</button>`;
          html += `</div>`;
        });
      }
      document.getElementById('tab-content').innerHTML = html;
    }
    function findClient() {
      if(money<5){log.push('Недостаточно денег на поиск клиентов!');update();return;}
      money-=5;
      // Тип клиента
      let types = ['meth','cocaine','weed'];
      let type = types[Math.floor(Math.random()*types.length)];
      let names = ['Вася','Петя','Иван','Саша','Джон','Мигель','Том','Лёха','Дима','Рикардо','Пабло','Коля','Ганс'];
      let name = names[Math.floor(Math.random()*names.length)];
      let price = 0;
      if(type==='meth') price = 120+Math.floor(Math.random()*40);
      if(type==='cocaine') price = 90+Math.floor(Math.random()*30);
      if(type==='weed') price = 40+Math.floor(Math.random()*20);
      clients.push({type,name,price});
      log.push('Найден новый клиент: '+name);
      update(); renderClients();
    }
    function sellToClient(idx) {
      let c = clients[idx];
      let ok = Math.random()<0.85;
      let amount = 10;
      if(c.type==='meth'){
        if(meth<amount){log.push('Недостаточно мета!');update();return;}
        if(ok){meth-=amount;money+=c.price;log.push('Продано 10г мета клиенту '+c.name+'.');}
        else{risk+=8;log.push('Клиент оказался копом! Риск вырос!');}
      }
      if(c.type==='cocaine'){
        if(product<amount){log.push('Недостаточно кокаина!');update();return;}
        if(ok){product-=amount;money+=c.price;log.push('Продано 10г кокаина клиенту '+c.name+'.');}
        else{risk+=7;log.push('Клиент оказался копом! Риск вырос!');}
      }
      if(c.type==='weed'){
        if(product<amount){log.push('Недостаточно марихуаны!');update();return;}
        if(ok){product-=amount;money+=c.price;log.push('Продано 10г марихуаны клиенту '+c.name+'.');}
        else{risk+=5;log.push('Клиент оказался копом! Риск вырос!');}
      }
      clients.splice(idx,1);
      update(); renderClients();
    }
    function update() {
      document.getElementById('stats').innerHTML =
        `<div>День: <b>${day}</b></div>` +
        `<div>Деньги: <b>${money}$</b></div>` +
        `<div>Товар: <b>${product} г</b></div>` +
        `<div>Риск: <b>${risk}%</b></div>` +
        `<div>Внимание полиции: <b>${wanted}%</b></div>`;
      document.getElementById('log').innerHTML = log.slice(-5).join('<br>');
    }

    function produce() {
      if (money < 20) { log.push('Недостаточно денег для производства.'); update(); return; }
      let amount = Math.floor(Math.random()*6)+5;
      product += amount;
      money -= 20;
      risk += 2;
      log.push(`Произведено ${amount} г товара. -20$`);
      update();
    }

    function sell() {
      if (product < 5) { log.push('Недостаточно товара для продажи.'); update(); return; }
      let amount = Math.min(product, Math.floor(Math.random()*8)+5);
      let price = amount * (10 + Math.floor(Math.random()*6));
      product -= amount;
      money += price;
      risk += 3;
      log.push(`Продано ${amount} г за ${price}$.`);
      update();
    }

    function nextDay() {
      day++;
      // Случайные события
      if (Math.random() < risk/100) {
        let fine = 50 + Math.floor(Math.random()*100);
        money = Math.max(0, money-fine);
        wanted += 10;
        log.push(`Полиция провела рейд! Штраф: ${fine}$.`);
      } else if (Math.random() < 0.15) {
        let loss = Math.floor(product*0.3);
        product = Math.max(0, product-loss);
        log.push(`Конкуренты украли ${loss} г товара!`);
      }
      // Сброс риска
      risk = Math.max(1, risk - 4);
      // Внимание полиции
      if (wanted > 0 && Math.random() < wanted/100) {
        log.push('Вас арестовали! Игра окончена.');
        disableGame();
        update();
        return;
      }
      update();
    }

    function disableGame() {
      document.querySelectorAll('button').forEach(btn => btn.disabled = true);
    }

    function showTab(tab) {
      document.getElementById('tab-farm').style.background = tab==='farm' ? '#ff4e7a' : '';
      document.getElementById('tab-lab').style.background = tab==='lab' ? '#ff4e7a' : '';
      document.getElementById('tab-shop').style.background = tab==='shop' ? '#ff4e7a' : '';
      document.getElementById('tab-clients').style.background = tab==='clients' ? '#ff4e7a' : '';
      document.getElementById('tab-fin').style.background = tab==='fin' ? '#ff4e7a' : '';
      if(tab==='farm') renderFarm();
      else if(tab==='lab') renderLab();
      else if(tab==='shop') renderShop();
      else if(tab==='clients') renderClients();
      else if(tab==='fin') renderFin();
    }
    function renderFarm() {
      let html = `<h2>Ферма</h2>`;
      html += `<div>Кокаиновые кусты: ${farm.cocaine.growing} растет, ${farm.cocaine.ready} готово</div>`;
      html += `<button onclick='plantCocaine()'>Посадить куст коки (-10$)</button> `;
      html += `<button onclick='harvestCocaine()'>Собрать урожай коки</button><br>`;
      html += `<div>Кусты марихуаны: ${farm.weed.growing} растет, ${farm.weed.ready} готово</div>`;
      html += `<button onclick='plantWeed()'>Посадить куст марихуаны (-5$)</button> `;
      html += `<button onclick='harvestWeed()'>Собрать урожай марихуаны</button>`;
      document.getElementById('tab-content').innerHTML = html;
    }
    function plantCocaine() {
      if(money<10){log.push('Недостаточно денег для посадки коки!');update();return;}
      money-=10; farm.cocaine.growing++;
      log.push('Посажен куст коки.'); update(); renderFarm();
    }
    function harvestCocaine() {
      if(farm.cocaine.ready<1){log.push('Нет готовых кустов коки!');update();return;}
      let amt = farm.cocaine.ready*5;
      product+=amt; farm.cocaine.ready=0;
      log.push(`Собрано ${amt} г кокаина.`); update(); renderFarm();
    }
    function plantWeed() {
      if(money<5){log.push('Недостаточно денег для посадки марихуаны!');update();return;}
      money-=5; farm.weed.growing++;
      log.push('Посажен куст марихуаны.'); update(); renderFarm();
    }
    function harvestWeed() {
      if(farm.weed.ready<1){log.push('Нет готовых кустов марихуаны!');update();return;}
      let amt = farm.weed.ready*7;
      product+=amt; farm.weed.ready=0;
      log.push(`Собрано ${amt} г марихуаны.`); update(); renderFarm();
    }
    // Рост растений каждый день
    const oldNextDay = nextDay;
    nextDay = function() {
      // Рост коки
      if(farm.cocaine.growing>0){farm.cocaine.ready+=farm.cocaine.growing;farm.cocaine.growing=0;log.push('Кусты коки созрели!');}
      // Рост марихуаны
      if(farm.weed.growing>0){farm.weed.ready+=farm.weed.growing;farm.weed.growing=0;log.push('Кусты марихуаны созрели!');}
      oldNextDay();
      renderFarm();
    }
    // Заглушки для других вкладок
    function renderLab(){document.getElementById('tab-content').innerHTML='<h2>Лаборатория</h2><div>Скоро...</div>'}
    function renderShop(){document.getElementById('tab-content').innerHTML='<h2>Магазин</h2><div>Скоро...</div>'}
    function renderClients(){document.getElementById('tab-content').innerHTML='<h2>Клиенты</h2><div>Скоро...</div>'}
    function renderFin(){document.getElementById('tab-content').innerHTML='<h2>Финансы</h2><div>Скоро...</div>'}
    // Показываем ферму по умолчанию
    showTab('farm');
    update();
  </script>
</body>
</html>
